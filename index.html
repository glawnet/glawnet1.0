<!DOCTYPE html>

<html>
<head>
<title>GLAWNET</title>
<style>
body { background: black; color: white; text-align: center; margin: 0; overflow: hidden; }
canvas { background: #111; display: block; margin: 0 auto; border-bottom: 5px solid blue; }
#menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; padding: 20px; border: 2px solid blue; display: none; }
</style>
</head>
<body>

<h1>GLAWNET</h1>
<p>Score: <span id="s">0</span></p>
<canvas id="g"></canvas>

<div id="menu">
<h2>GAME OVER</h2>
<p>Final Score: <span id="fs">0</span></p>
<button onclick="alert('TEST SUCCESS!')" style="padding: 20px; background: blue; color: white; font-weight: bold;">SAVE SCORE (TEST)</button>



<button onclick="location.reload()">Try Again</button>
</div>

<script>
var c = document.getElementById("g");
var x = c.getContext("2d");
c.width = 400; c.height = 600;

var score = 0; var active = true;
var p = { x: 180, y: 500, w: 40, h: 40 };
var obs = [];

function loop() {
if (!active) return;
x.clearRect(0, 0, 400, 600);

x.fillStyle = "blue";
x.fillRect(p.x, p.y, p.w, p.h);

if (Math.random() < 0.03) {
obs.push({ x: Math.random() * 360, y: -40, w: 40, h: 40 });
}

for (var i = 0; i < obs.length; i++) {
var o = obs[i];
o.y += 5;
x.fillStyle = "red";
x.fillRect(o.x, o.y, o.w, o.h);

if (p.x < o.x + o.w && p.x + p.w > o.x && p.y < o.y + o.h && p.y + p.h > o.y) {
active = false;
document.getElementById("menu").style.display = "block";
document.getElementById("fs").innerText = score;
}

if (o.y > 600) {
obs.splice(i, 1);
score++;
document.getElementById("s").innerText = score;
}
}
requestAnimationFrame(loop);
}

window.addEventListener("touchmove", function(e) {
var rect = c.getBoundingClientRect();
p.x = (e.touches[0].clientX - rect.left) - 20;
});

loop();
</script>

</body>
</html>
